<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f5f2eb">
  <title>Palladium Properties</title>

  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    :root {
      --gold: #b99655;
      --gold-dark: #8e6f38;
      --text: #222222;
      --muted: #77716a;
      --line: rgba(185, 150, 85, 0.25);
      --surface: rgba(255, 255, 255, 0.94);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(185,150,85,.13), transparent 42%),
        linear-gradient(145deg, #f8f6f1, #eeebe4);
    }

    .card {
      width: min(100%, 430px);
      padding: 38px 30px 30px;
      text-align: center;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,.8);
      border-radius: 26px;
      box-shadow: 0 22px 55px rgba(50, 42, 28, 0.14);
      backdrop-filter: blur(10px);
    }

    .logo {
      width: min(250px, 80%);
      height: auto;
      display: block;
      margin: 0 auto 16px;
      filter: drop-shadow(0 7px 10px rgba(0,0,0,.10));
    }

    .eyebrow {
      margin: 0;
      color: var(--gold-dark);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .22em;
      text-transform: uppercase;
    }

    .intro {
      max-width: 310px;
      margin: 10px auto 24px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
    }

    .links {
      display: grid;
      gap: 11px;
    }

    .btn {
      position: relative;
      display: flex;
      align-items: center;
      min-height: 55px;
      padding: 12px 18px;
      overflow: hidden;
      color: var(--text);
      text-decoration: none;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 15px;
      box-shadow: 0 6px 18px rgba(50,42,28,.06);
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
    }

    .btn::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 25%, rgba(185,150,85,.12), transparent 75%);
      transform: translateX(-110%);
      transition: transform .45s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      border-color: rgba(185,150,85,.55);
      box-shadow: 0 10px 23px rgba(50,42,28,.10);
    }

    .btn:hover::after {
      transform: translateX(110%);
    }

    .icon {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      flex: 0 0 34px;
      margin-right: 13px;
      color: white;
      background: linear-gradient(145deg, #c6a567, #96743a);
      border-radius: 10px;
      font-size: 16px;
      box-shadow: 0 5px 12px rgba(150,116,58,.22);
    }

    .label {
      flex: 1;
      text-align: left;
      font-size: 15px;
      font-weight: 700;
    }

    .email-label {
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .arrow {
      margin-left: 10px;
      color: var(--gold-dark);
      font-size: 13px;
    }

    footer {
      margin-top: 23px;
      color: #9a958e;
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    @media (max-width: 420px) {
      body {
        padding: 16px;
      }

      .card {
        padding: 32px 20px 25px;
        border-radius: 22px;
      }

      .btn {
        padding: 11px 14px;
      }
    }
  </style>
</head>
